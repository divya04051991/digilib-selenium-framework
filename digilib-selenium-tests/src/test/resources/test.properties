#This properties file used to get configurable values based on project. this values may vary based on projects.
#For Example : In test.properties file having user.default.roleName. In cjf template application default role assigned to new user Todo Management.
#This role is configurable we can change by using application.properties. we have selenium tests to check default role is assigned to user or not.
#If any application change default role selenium tests will fail. To avoid this issue we provide test.properties here. 

#Default Role Assinged to User
user.default.roleName=Todo Management