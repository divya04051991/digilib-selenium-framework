# JULI Log Level Maping with SLF4J API :
#
# FINEST  -> TRACE
# FINER   -> DEBUG
# FINE    -> DEBUG
# INFO    -> INFO
# WARNING -> WARN
# SEVERE  -> ERROR
 
handlers=java.util.logging.ConsoleHandler

java.util.logging.ConsoleHandler.level=FINE

############################################################
# Define log format here
# Keeping this format to apply to all the loggers 
#1. date - a Date object representing event time of the log record.
#2. source - a string representing the caller, if available; otherwise, the logger's name.
#3. logger - the logger's name.
#4. level - the log level.
#5. message - the formatted log message returned from the Formatter.formatMessage(LogRecord) method. It uses java.text formatting and does not use the java.util.Formatter format argument.
#6. thrown - a string representing the throwable associated with the log record and its backtrace beginning with a newline character, if any; otherwise, an empty string.
############################################################
java.util.logging.SimpleFormatter.format=%1$tF %1$tT - %4$s %2$s - %5$s %6$s%n

############################################################
# Log level by package/class
############################################################
#com.ceva.cjf.base.web.ErrorReportManagedBean.level = WARNING
#com.ceva.digilib.presentation.TodoController.level = FINE
#com.ceva.security.aaf.service.AAFUserServiceImpl.level = SEVERE
#org.apache.tomcat.websocket.server.WsRemoteEndpointImplServer.level = WARNING
#org.apache.shiro.authc.pam.ModularRealmAuthenticator.level = SEVERE


com.ceva.handlers=java.util.logging.ConsoleHandler
com.ceva.level=FINE

.level=INFO

